@if (loading()) {
  <div class="flex items-center justify-center py-20">
    <div class="animate-spin w-8 h-8 border-2 border-blue-600 border-t-transparent rounded-full"></div>
  </div>
} @else if (error()) {
  <div class="py-12 text-center text-slate-500 dark:text-slate-400">
    <p class="text-lg font-medium">Conteúdo não encontrado</p>
    <p class="text-sm mt-1">O arquivo markdown não pôde ser carregado.</p>
  </div>
} @else {
  <article class="px-8 py-10 max-w-3xl">
    <div
      class="prose prose-slate dark:prose-invert max-w-none
             prose-headings:font-semibold prose-headings:tracking-tight
             prose-a:text-blue-600 dark:prose-a:text-blue-400
             prose-code:bg-slate-100 dark:prose-code:bg-slate-800
             prose-code:rounded prose-code:px-1 prose-code:text-sm
             prose-pre:bg-slate-900 dark:prose-pre:bg-slate-950
             prose-blockquote:border-blue-500"
      [innerHTML]="content()"
    ></div>

    @if (regulationIds().length > 0) {
      <div class="mt-10 pt-6 border-t border-slate-200 dark:border-slate-700">
        <h4 class="text-xs font-semibold uppercase tracking-wider text-slate-500 dark:text-slate-400 mb-3">
          Regulamentação relacionada
        </h4>
        <div class="flex flex-wrap gap-2">
          @for (id of regulationIds(); track id) {
            <app-regulation-badge [regulationId]="id" />
          }
        </div>
      </div>
    }
  </article>
}

@if (focusedDiagram()) {
  <div
    class="mermaid-modal-overlay"
    (click)="closeFocusedDiagram()"
    role="dialog"
    aria-modal="true"
    aria-label="Diagrama ampliado"
  >
    <div class="mermaid-modal-content" (click)="$event.stopPropagation()">
      <button class="mermaid-modal-close" (click)="closeFocusedDiagram()" aria-label="Fechar diagrama">
        <svg
          xmlns="http://www.w3.org/2000/svg"
          width="20"
          height="20"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          stroke-linecap="round"
          stroke-linejoin="round"
        >
          <line x1="18" y1="6" x2="6" y2="18"></line>
          <line x1="6" y1="6" x2="18" y2="18"></line>
        </svg>
      </button>
      <div class="mermaid-modal-diagram" [innerHTML]="focusedDiagram()"></div>
    </div>
  </div>
}
