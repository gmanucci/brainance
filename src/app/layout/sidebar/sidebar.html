<!-- Backdrop (mobile only): tap to close when sidebar is open -->
@if (sidebarService.isOpen()) {
  <div
    class="md:hidden fixed inset-0 top-14 z-30 bg-slate-900/40 backdrop-blur-sm"
    (click)="sidebarService.close()"
    aria-hidden="true"
  ></div>
}

<aside
  id="app-sidebar"
  class="liquid-glass-sidebar fixed top-14 left-0 bottom-0 w-64 overflow-y-auto z-40 py-6 px-4 transform transition-transform duration-300 ease-out will-change-transform"
  [class.translate-x-0]="sidebarService.isOpen()"
  [class.-translate-x-full]="!sidebarService.isOpen()"
  [attr.aria-hidden]="!sidebarService.isOpen()"
>
  <nav>
    @for (section of navSections; track section.featureKey) {
      <div class="mb-4">
        <!-- Section header (collapsible) -->
        <button
          (click)="toggleSection(section.featureKey)"
          class="flex items-center justify-between w-full text-left text-xs font-semibold uppercase tracking-wider text-slate-500 dark:text-slate-400 hover:text-slate-900 dark:hover:text-white mb-1 py-1 transition-colors"
        >
          <span>{{ section.title }}</span>
          <svg
            class="w-3 h-3 transition-transform"
            [class.rotate-180]="!isOpen(section.featureKey)"
            fill="none"
            stroke="currentColor"
            stroke-width="2.5"
            viewBox="0 0 24 24"
          >
            <path stroke-linecap="round" stroke-linejoin="round" d="M19 9l-7 7-7-7" />
          </svg>
        </button>

        @if (isOpen(section.featureKey)) {
          <ul class="space-y-0.5">
            @for (item of section.items; track item.path) {
              <li>
                <a
                  [routerLink]="item.path.split('?')[0]"
                  [queryParams]="item.path.includes('?') ? parseQuery(item.path) : null"
                  routerLinkActive="bg-blue-50 text-blue-600 dark:bg-blue-950 dark:text-blue-400"
                  [routerLinkActiveOptions]="{ exact: true }"
                  class="block px-3 py-1.5 rounded-md text-sm text-slate-600 dark:text-slate-300 hover:bg-slate-100 dark:hover:bg-slate-800 hover:text-slate-900 dark:hover:text-white transition-colors"
                >
                  {{ item.label }}
                </a>
              </li>
            }
          </ul>
        }
      </div>
    }
  </nav>
</aside>
